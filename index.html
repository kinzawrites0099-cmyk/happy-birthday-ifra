<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Ifra's Birthday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298, #7e22ce, #ec4899);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        
        .welcome-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .name {
            font-size: 5rem;
            background: linear-gradient(45deg, #ffd700, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        
        .enter-btn {
            margin-top: 40px;
            padding: 20px 60px;
            font-size: 1.5rem;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .enter-btn:hover {
            transform: scale(1.1);
        }
        
        .balloons {
            font-size: 4rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome-box">
            <div class="balloons">🎈🎂🎈</div>
            <h1>Welcome to</h1>
            <div class="name">Ifra's</div>
            <h2>15th Birthday Celebration! 🎉</h2>
            <a href="wish.html" class="enter-btn">Enter Magic World ✨</a>
        </div>
    </div>
</body>
</html>
