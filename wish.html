<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ifra!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            z-index: 100;
            display: flex;
            gap: 20px;
        }
        
        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s;
        }
        
        .nav a:hover, .nav a.active {
            background: white;
            color: #e73c7e;
        }
        
        .container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 100px 20px 20px;
        }
        
        .wish-box {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            padding: 60px;
            border-radius: 30px;
            max-width: 800px;
        }
        
        .cake {
            font-size: 6rem;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(10deg); }
        }
        
        h1 {
            font-size: 4rem;
            margin: 30px 0;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }
        
        .name {
            font-size: 6rem;
            background: linear-gradient(45deg, #ffd700, #fff, #ff69b4, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
        }
        
        @keyframes shine {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .age {
            font-size: 2.5rem;
            margin: 20px 0;
        }
        
        .play-btn {
            margin-top: 30px;
            padding: 20px 50px;
            font-size: 1.3rem;
            background: white;
            color: #e73c7e;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .play-btn:hover {
            transform: scale(1.1);
        }
        
        .hearts {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }
        
        .heart {
            position: absolute;
            font-size: 2rem;
            animation: fall 8s linear infinite;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <nav class="nav">
        <a href="index.html">🏠 Home</a>
        <a href="wish.html" class="active">🎂 Wish</a>
        <a href="surprise.html">🎁 Surprise</a>
        <a href="message.html">💌 Message</a>
    </nav>
    
    <div class="container">
        <div class="wish-box">
            <div class="cake">🎂</div>
            <h1>Happy Birthday</h1>
            <div class="name">Ifra!</div>
            <div class="age">🎉 15 Years of Awesomeness! 🎉</div>
            <button class="play-btn" onclick="playMusic()">🎵 Play Birthday Song!</button>
        </div>
    </div>
    
    <audio id="birthdaySong" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        function createHearts() {
            const container = document.getElementById('hearts');
            const symbols = ['💖', '💕', '💗', '💝', '🎈', '✨'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 8000);
            }, 300);
        }
        
        function playMusic() {
            const audio = document.getElementById('birthdaySong');
            audio.volume = 0.5;
            audio.play();
            event.target.innerHTML = '🎶 Music Playing...';
        }
        
        createHearts();
    </script>
</body>
</html>
